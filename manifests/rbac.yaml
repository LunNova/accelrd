#
# RBAC for accelrd DaemonSet.
# - ServiceAccount lives in its own namespace.
# - ClusterRole grants the minimum needed: GET node metadata + PATCH the
#   node it runs on. We don't list/watch — the daemon only ever touches
#   its own node, identified via downward API.
---
apiVersion: v1
kind: Namespace
metadata:
  name: accelrd
  labels:
    pod-security.kubernetes.io/enforce: restricted
    pod-security.kubernetes.io/audit: restricted
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: accelrd
  namespace: accelrd
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: accelrd
rules:
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: accelrd
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: accelrd
subjects:
  - kind: ServiceAccount
    name: accelrd
    namespace: accelrd
