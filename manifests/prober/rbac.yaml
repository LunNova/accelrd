#
# accelrd prober RBAC. The prober is a single-replica controller that
# pairs same-rack nodes and creates RoCE bandwidth probe Pods. It needs:
#
#  * Cluster-wide read on Nodes (find pairs by rack label).
#  * Cluster-wide patch on Nodes (write `accel-test.lunnova.dev/last-rack-*`
#    annotations after each probe).
#  * Pod CRUD in its own namespace (where probe pods are created — pinned
#    to the chosen nodes via `nodeName`, regardless of where the prober runs).
#  * pods/log read (parse the client probe's stdout JSON).
#
# We bind a single ClusterRole both ways:
#  - ClusterRoleBinding for the cluster-scoped Nodes rule
#  - RoleBinding (in our namespace) for the namespaced Pods rule
# This keeps namespace blast radius small while still allowing the prober
# to discover any node in the cluster.
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: accelrd-prober
  namespace: accelrd
  labels:
    app.kubernetes.io/name: accelrd-prober
    app.kubernetes.io/component: controller
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: accelrd-prober
  labels:
    app.kubernetes.io/name: accelrd-prober
rules:
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list", "watch", "patch"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch", "create", "delete"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: accelrd-prober
  labels:
    app.kubernetes.io/name: accelrd-prober
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: accelrd-prober
subjects:
  - kind: ServiceAccount
    name: accelrd-prober
    namespace: accelrd
