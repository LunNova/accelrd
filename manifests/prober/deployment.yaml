#
# accelrd prober Deployment. Singleton controller — keep replicas: 1.
# (No leader election yet; HA is a future change.)
#
# This is a regular workload pod: no hostNetwork, no host filesystem,
# no privileged caps. It only talks to the apiserver and to the OTLP
# collector, and it creates probe Pods in its own namespace via the
# RBAC bound in rbac.yaml.
#
# Probe pods (created dynamically by this controller) DO require host
# /dev/infiniband + IPC_LOCK — see manifests/probe/template.yaml for
# the shape they take. The image referenced by ACCELRD_PROBER_PROBE_IMAGE
# must contain `ib_send_bw` (perftest); the same accelrd image bakes it
# in by default.
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: accelrd-prober
  namespace: accelrd
  labels:
    app.kubernetes.io/name: accelrd-prober
    app.kubernetes.io/component: controller
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: accelrd-prober
  template:
    metadata:
      labels:
        app.kubernetes.io/name: accelrd-prober
        app.kubernetes.io/component: controller
    spec:
      serviceAccountName: accelrd-prober
      automountServiceAccountToken: true
      priorityClassName: system-cluster-critical
      containers:
        - name: prober
          image: ghcr.io/lunnova/accelrd:latest
          imagePullPolicy: IfNotPresent
          args:
            - prober
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_UID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.uid
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: CONTAINER_NAME
              value: prober
            - name: ACCELRD_PROBER_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            # Must match `image:` above. Used by the prober to populate
            # probe pods' container image. There is no reliable downward-API
            # path that exposes the running image, so we plumb it explicitly.
            - name: ACCELRD_PROBER_PROBE_IMAGE
              value: ghcr.io/lunnova/accelrd:latest
            - name: ACCELRD_OTLP_ENDPOINT
              value: "http://otel-collector.observability.svc.cluster.local:4318"
            # Extended-resource claims spliced into each probe pod's
            # container `resources.{requests,limits}` map. Format is a
            # comma-separated list of key=value pairs. Pick the key that
            # matches the RDMA device plugin installed on the cluster:
            #   squat.ai/infiniband=1     (squat-ai/k8s-rdma-shared-dev-plugin)
            #   rdma/hca_shared_devices_a=1   (Mellanox shared mode)
            #   nvidia.com/hostdev=1      (NVIDIA Network Operator)
            # Without this, kubelet doesn't program the device-cgroup
            # allow rule for /dev/infiniband and probe pods see EPERM
            # opening the uverbs files even with the hostPath mount.
            - name: ACCELRD_PROBER_PROBE_RESOURCES
              value: "squat.ai/infiniband=1"
            - name: RUST_LOG
              value: "info,opentelemetry=warn,reqwest=error,kube=info"
          securityContext:
            runAsNonRoot: true
            runAsUser: 65532
            runAsGroup: 65532
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
            seccompProfile:
              type: RuntimeDefault
          resources:
            requests:
              cpu: 100m
              memory: 64Mi
            limits:
              cpu: "1"
              memory: 256Mi
