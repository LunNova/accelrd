#
# accelrd DaemonSet. Runs one pod per accelerator-bearing node
# (selected via nodeSelector or tolerations — adjust below to match your
# cluster's accelerator-node labels).
#
# Reads /sys and /proc read-only. Patches its own node's labels via the
# accelrd ServiceAccount (see rbac.yaml).
#
# Set ACCELRD_OTLP_ENDPOINT to your collector's address. Set
# ACCELRD_RACK / ACCELRD_BLOCK from a node's existing
# labels via env-from-fieldRef if you have inventory automation, or
# bake them into per-node ConfigMaps.
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: accelrd
  namespace: accelrd
  labels:
    app.kubernetes.io/name: accelrd
    app.kubernetes.io/component: agent
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: accelrd
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 25%
  template:
    metadata:
      labels:
        app.kubernetes.io/name: accelrd
        app.kubernetes.io/component: agent
    spec:
      serviceAccountName: accelrd
      # Run only on nodes that have accelerators. Replace with whatever
      # label your cluster uses (NFD's `feature.node.kubernetes.io/pci-...`,
      # cloud provider label, etc.). Two common choices:
      # nodeSelector:
      #   nvidia.com/gpu.present: "true"
      # nodeSelector:
      #   amd.com/gpu: "true"
      nodeSelector: {}
      # Tolerate the standard "this node has GPUs" taints so the daemon
      # actually lands on accelerator nodes.
      tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule
        - key: amd.com/gpu
          operator: Exists
          effect: NoSchedule
        - key: accelerator
          operator: Exists
          effect: NoSchedule
      priorityClassName: system-node-critical
      hostPID: false
      # hostNetwork is required for LLDP capture: link-local multicast
      # (01:80:c2:00:00:0e) is delivered by the kernel to interfaces in
      # the host network namespace, not pod-internal namespaces.
      hostNetwork: true
      # Default dnsPolicy (ClusterFirst) is silently ignored under
      # hostNetwork; the pod would inherit the node's /etc/resolv.conf
      # and lose cluster DNS — meaning ACCELRD_OTLP_ENDPOINT pointing
      # at otel-collector.observability.svc.cluster.local would fail to
      # resolve. ClusterFirstWithHostNet is the canonical pairing for
      # host-networked pods that still need to talk to cluster services.
      dnsPolicy: ClusterFirstWithHostNet
      automountServiceAccountToken: true
      containers:
        - name: accelrd
          image: ghcr.io/lunnova/accelrd:latest
          imagePullPolicy: IfNotPresent
          args:
            # The accelrd binary is a multi-subcommand toolkit; this manifest
            # is the per-node daemon. Sibling deployments (prober, probe pods
            # created by it) live under manifests/prober/.
            - daemon
            # argh requires --flag value (space-separated); --flag=value
            # is rejected as an unrecognized top-level argument.
            - --otlp-endpoint
            - $(ACCELRD_OTLP_ENDPOINT)
          env:
            # Downward API: feed the pod's own identity into the daemon
            # so the OTel resource ships proper k8s.* semantic
            # conventions (k8s.pod.name, k8s.pod.uid, k8s.namespace.name,
            # k8s.node.name, k8s.container.name, k8s.daemonset.name).
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_UID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.uid
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: CONTAINER_NAME
              value: accelrd
            - name: DAEMONSET_NAME
              value: accelrd
            - name: ACCELRD_OTLP_ENDPOINT
              value: "http://otel-collector.observability.svc.cluster.local:4318"
            - name: RUST_LOG
              value: "info,opentelemetry=warn,reqwest=error"
            # Point at your inventory automation here:
            # - name: ACCELRD_RACK
            #   valueFrom:
            #     fieldRef:
            #       fieldPath: metadata.labels['topology.example.com/rack']
            # - name: ACCELRD_BLOCK
            #   valueFrom:
            #     fieldRef:
            #       fieldPath: metadata.labels['topology.example.com/block']
          securityContext:
            # Run as root *inside the container* so the requested
            # CAP_NET_RAW lands in the effective set on exec. With
            # runAsNonRoot, the kernel zeroes effective/permitted caps
            # for non-root uids on execve unless ambient caps or file
            # capabilities are set; capabilities.add only populates the
            # bounding set, not effective. allowPrivilegeEscalation:false
            # additionally sets no_new_privs which would block the
            # file-cap recovery path. The container is still strongly
            # confined: drop:ALL gives it only NET_RAW, the root FS is
            # read-only, RuntimeDefault seccomp is on, and there's no
            # hostPID. This is "root in a netns with one capability,"
            # not "root on the host."
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
              # CAP_NET_RAW is required to open the AF_PACKET socket
              # used for LLDP capture. Drop it (or set --no-lldp) if
              # rack auto-discovery isn't needed.
              add: ["NET_RAW"]
            seccompProfile:
              type: RuntimeDefault
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 200m
              memory: 128Mi
          volumeMounts:
            - name: sys
              mountPath: /sys
              readOnly: true
            - name: proc
              mountPath: /proc
              readOnly: true
      volumes:
        - name: sys
          hostPath:
            path: /sys
            type: Directory
        - name: proc
          hostPath:
            path: /proc
            type: Directory
