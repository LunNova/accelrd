#
# RBAC for the accelrd workloads. Two ServiceAccounts in this file:
# - `accelrd` (DaemonSet): GET node metadata + PATCH the node it runs
#   on. We don't list/watch — the daemon only ever touches its own
#   node, identified via downward API.
# - `accelrd-admin` (admin Deployment): LIST/GET/WATCH on Nodes and
#   Pods, no write verbs. The admin pod is a read-only console; if its
#   token leaks, all an attacker can do is enumerate cluster state
#   the operator was already going to expose to humans.
---
apiVersion: v1
kind: Namespace
metadata:
  name: accelrd
  labels:
    # The DaemonSet needs hostNetwork (for LLDP multicast), CAP_NET_RAW
    # (raw AF_PACKET socket), and hostPath mounts (/sys, /proc). All three
    # are forbidden by `baseline` and `restricted` PSA levels, so the
    # namespace must be `privileged` for the pod to admit. We still warn
    # at `baseline` so operators see if anyone *else* deploys something
    # less-privileged-than-the-daemon into this namespace.
    pod-security.kubernetes.io/enforce: privileged
    pod-security.kubernetes.io/warn: baseline
    pod-security.kubernetes.io/audit: baseline
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: accelrd
  namespace: accelrd
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: accelrd
rules:
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: accelrd
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: accelrd
subjects:
  - kind: ServiceAccount
    name: accelrd
    namespace: accelrd
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: accelrd-admin
  namespace: accelrd
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: accelrd-admin
rules:
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: accelrd-admin
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: accelrd-admin
subjects:
  - kind: ServiceAccount
    name: accelrd-admin
    namespace: accelrd
