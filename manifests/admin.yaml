#
# accelrd admin console — read-only web UI surfacing the cluster's
# accelerator topology (from the daemon's node labels) and the prober's
# probe results (from node annotations), plus live accelerator metrics
# pulled from a mutel instance the OTLP pipeline already feeds.
#
# Singleton Deployment, ClusterIP Service. Reach it via:
#   kubectl -n accelrd port-forward svc/accelrd-admin 8080:80
# then open http://localhost:8080/.
#
# RBAC for the admin SA is defined in rbac.yaml: list/watch/get on
# Nodes and Pods, nothing else. The admin pod can never mutate cluster
# state.
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: accelrd-admin
  namespace: accelrd
  labels:
    app.kubernetes.io/name: accelrd-admin
    app.kubernetes.io/component: admin
spec:
  # Singleton — the UI is stateless so a second replica gains nothing
  # and just doubles RBAC blast radius and mutel query load.
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: accelrd-admin
  template:
    metadata:
      labels:
        app.kubernetes.io/name: accelrd-admin
        app.kubernetes.io/component: admin
    spec:
      serviceAccountName: accelrd-admin
      automountServiceAccountToken: true
      # No host{Network,PID,Path}, no caps. Plain restricted-PSA pod.
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: admin
          image: ghcr.io/lunnova/accelrd:latest
          imagePullPolicy: IfNotPresent
          args:
            - admin
            - --listen=$(ACCELRD_ADMIN_LISTEN)
            - --mutel-endpoint=$(ACCELRD_MUTEL_ENDPOINT)
            - --otlp-endpoint=$(ACCELRD_OTLP_ENDPOINT)
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: ACCELRD_ADMIN_LISTEN
              value: "0.0.0.0:8080"
            # Live metric/log queries go to mutel directly — its
            # `/api/*` surface is what the UI reads. Different role
            # from OTLP ingest below; mutel happens to also be an
            # OTLP endpoint, but the admin doesn't use it that way.
            - name: ACCELRD_MUTEL_ENDPOINT
              value: "http://mutel.observability.svc.cluster.local:4318"
            # Self-telemetry: ship to whatever OTLP endpoint the rest
            # of accelrd ships to. Matches the daemonset default so
            # operators only configure one collector.
            - name: ACCELRD_OTLP_ENDPOINT
              value: "http://otel-collector.observability.svc.cluster.local:4318"
            - name: RUST_LOG
              value: "info,opentelemetry=warn,reqwest=error,tower_http=warn"
            # Downward API: same plumbing as the daemon so the OTel
            # resource attributes carry proper k8s.* identity.
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_UID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.uid
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: CONTAINER_NAME
              value: admin
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 2
            periodSeconds: 10
            timeoutSeconds: 3
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 200m
              memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: accelrd-admin
  namespace: accelrd
  labels:
    app.kubernetes.io/name: accelrd-admin
    app.kubernetes.io/component: admin
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: accelrd-admin
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP
